global:
  cloud: aws
  region: eu-west-1
  environment: prod
  imageRegistry: 123456789.dkr.ecr.eu-west-1.amazonaws.com

replicaCount: 5

image:
  repository: smartly/creative-delivery
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

keda:
  enabled: true
  kafkaTopic: ad-impressions
  kafkaConsumerGroup: creative-delivery-consumer
  lagThreshold: 100
  minReplicaCount: 3
  maxReplicaCount: 50

kafka:
  brokers: kafka-bootstrap.kafka:9092
  partitions: 32
  securityProtocol: SASL_SSL

istio:
  enabled: true
  mtls: true
  virtualServiceEnabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s

slo:
  errorRateThreshold: 0.005
  latencyP99ThresholdMs: 100
  availabilityTarget: 99.95

networkPolicy:
  enabled: true
  allowedNamespaces:
    - smartly-platform
    - monitoring
    - istio-system
