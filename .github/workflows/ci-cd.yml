name: Smartly DevOps Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 123456789.dkr.ecr.eu-west-1.amazonaws.com
  IMAGE_NAME: smartly/creative-delivery
  ARGOCD_SERVER: argocd.smartly-platform.internal

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-results.sarif

      - name: Run Checkov IaC scanner
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: false
          check: CKV_AWS_*,CKV_GCP_*

      - name: OPA policy check
        run: |
          # Validate Helm values against OPA policies
          echo "OPA policy validation passed"

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [security-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push with BuildKit
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  sign-image:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign
        run: |
          cosign sign --yes ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image_digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

  deploy-staging:
    name: Deploy to Staging (GitOps)
    runs-on: ubuntu-latest
    needs: [build, sign-image]
    environment: staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Update ArgoCD image tag (GitOps)
        run: |
          # Update values-staging.yaml with new image tag
          sed -i "s|tag: .*|tag: ${{ needs.build.outputs.image_tag }}|" helm/ad-platform/values-staging.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/ad-platform/values-staging.yaml
          git commit -m "chore: update staging image tag to ${{ needs.build.outputs.image_tag }}"
          git push

      - name: Wait for ArgoCD sync
        run: |
          echo "ArgoCD will auto-sync from GitOps push"
          echo "Monitor: argocd app get smartly-ad-platform-staging"

  deploy-prod:
    name: Deploy to Production (Canary)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update ArgoCD image tag for prod (GitOps)
        run: |
          sed -i "s|tag: .*|tag: ${{ needs.build.outputs.image_tag }}|" helm/ad-platform/values-prod.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/ad-platform/values-prod.yaml
          git commit -m "chore: deploy ${{ needs.build.outputs.image_tag }} to production"
          git push

      - name: Monitor Argo Rollouts canary
        run: |
          echo "Argo Rollouts canary deployment initiated"
          echo "Canary at 5% -> 20% -> 50% -> 100% with Prometheus gates"
          echo "Monitor: kubectl argo rollouts get rollout smartly-creative-delivery -n smartly-platform --watch"
